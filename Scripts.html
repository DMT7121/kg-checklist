  // Handle Apps Script Webapp URL Configuration
  let gasApiUrl = '';
  function initApiUrl() {
    const urlParams = new URLSearchParams(window.location.search);
    const paramApi = urlParams.get('api');
    if (paramApi) {
      localStorage.setItem(API_URL_KEY, paramApi);
      gasApiUrl = paramApi;
    } else {
      gasApiUrl = localStorage.getItem(API_URL_KEY) || '';
    }
  }

  // API Call Dispatcher
  async function callAPI(methodName, args = []) {
    // 1. If running natively in Google Apps Script Environment
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      return new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(res => {
            if (res && res.success) resolve(res.data);
            else reject(new Error(res ? res.error : "Unknown error"));
          })
          .withFailureHandler(err => reject(err))
          [methodName](...args);
      });
    }

    // 2. If external hosting, call deployed API URL
    initApiUrl();
    if (!gasApiUrl) {
      console.warn("API URL not configured. Working in offline/local-only mode.");
      throw new Error("API_NOT_CONFIGURED");
    }

    try {
      // Use text/plain to avoid preflight OPTIONS request on Apps Script
      const response = await fetch(gasApiUrl, {
        method: 'POST',
        mode: 'cors',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify({ method: methodName, args: args })
      });
      const result = await response.json();
      if (result.success) {
        return result.data;
      }
      throw new Error(result.error || "Server responded with error status");
    } catch(err) {
      console.error("API Fetch Error:", err);
      throw err;
    }
  }

  // Utilities
  function todayISO() {
    const d = new Date();
    const off = d.getTimezoneOffset();
    return new Date(d.getTime() - off * 60000).toISOString().slice(0, 10);
  }
  
  function formatDateVN(iso) {
    if (!iso) return '__/__/20__';
    const [y, m, d] = iso.split('-');
    return `${d}/${m}/${y}`;
  }

  function safeId(text) {
    return (text || '').trim().toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/đ/g, 'd').replace(/[^a-z0-9]+/g, '_')
      .replace(/^_|_$/g, '');
  }

  function loadDB() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { version: 7, days: {} };
    } catch (e) {
      return { version: 7, days: {} };
    }
  }

  function saveDB() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
  }

  function loadSession() {
    try {
      return JSON.parse(localStorage.getItem(SESSION_KEY)) || { name: '', area: '' };
    } catch (e) {
      return { name: '', area: '' };
    }
  }

  function saveSession() {
    localStorage.setItem(SESSION_KEY, JSON.stringify(session));
  }

  function currentDate() {
    return $('#workDate').value || todayISO();
  }

  function ensureDay(dateKey) {
    if (!db.days[dateKey]) {
      db.days[dateKey] = { createdAt: new Date().toISOString(), areas: {} };
    }
    AREA_CODES.forEach(area => {
      if (!db.days[dateKey].areas[area]) {
        db.days[dateKey].areas[area] = {
          participants: [],
          items: {},
          supply: {},
          signatures: {}
        };
      }
    });
    return db.days[dateKey];
  }

  function getAreaData(area = selectedArea) {
    return ensureDay(currentDate()).areas[area];
  }

  function getSaveMode() {
    return $('input[name="saveMode"]:checked').value;
  }

  function toast(msg, type = 'info') {
    const el = $('#toast');
    el.textContent = msg;
    
    // Style toast by type
    if (type === 'success') {
      el.style.borderLeft = "5px solid var(--green)";
    } else if (type === 'error') {
      el.style.borderLeft = "5px solid var(--red)";
    } else {
      el.style.borderLeft = "5px solid var(--blue-2)";
    }
    
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 3000);
  }

  // Initialize
  async function init() {
    // Normalize fallback checklist IDs to match backend dynamic safeId mapping
    DEFAULT_CHECKLIST.forEach(group => {
      group.items.forEach(item => {
        if (Array.isArray(item.subitems)) {
          item.subitems.forEach(sub => {
            sub.id = safeId(sub.text);
          });
        }
      });
    });

    initApiUrl();
    $('#workDate').value = todayISO();
    $('#employeeName').value = session.name || '';
    ensureDay(currentDate());
    bindEvents();
    
    // Load config and sync date data
    await syncInitData();

    if (!localStorage.getItem(ONBOARD_KEY)) {
      openGuide();
    }
  }

  // Load configuration and data from Server
  async function syncInitData() {
    const dateKey = currentDate();
    toast('Đang nạp dữ liệu từ Google Sheets...', 'info');
    
    try {
      const serverData = await callAPI('getAppInitData', [dateKey]);
      if (serverData && serverData.checklist) {
        checklist = serverData.checklist;
      }
      
      flatItems = checklist.flatMap(group => group.items.map(item => ({ ...item, group })));
      
      // Merge server progress data into local IndexedDB/LocalStorage DB
      if (serverData && serverData.states) {
        const day = ensureDay(dateKey);
        AREA_CODES.forEach(area => {
          if (serverData.states[area]) {
            day.areas[area] = serverData.states[area];
          }
        });
        saveDB();
      }
      toast('Nạp dữ liệu trực tuyến thành công!', 'success');
    } catch(err) {
      console.warn("Failed to load server data:", err);
      // Fallback to local flatItems mapping
      flatItems = checklist.flatMap(group => group.items.map(item => ({ ...item, group })));
      
      if (err.message === 'API_NOT_CONFIGURED') {
        toast('Đang chạy chế độ ngoại tuyến (Chưa cài API URL)', 'info');
      } else {
        toast('Không kết nối được Sheets. Đang dùng dữ liệu ngoại tuyến.', 'error');
      }
    }
    
    renderAll();
  }

  function bindEvents() {
    // Date & UI filter triggers
    $('#workDate').addEventListener('change', async () => {
      pending = {};
      ensureDay(currentDate());
      await syncInitData();
    });
    
    $('#joinBtn').addEventListener('click', joinChecklist);
    $('#savePendingBtn').addEventListener('click', () => syncStateToServer(true));
    $('#syncServerBtn').addEventListener('click', () => syncStateToServer(true));
    
    $('#configApiBtn').addEventListener('click', async () => {
      const newUrl = prompt('Nhập địa chỉ Google Apps Script Web App URL:', gasApiUrl);
      if (newUrl !== null) {
        const cleanUrl = newUrl.trim();
        localStorage.setItem(API_URL_KEY, cleanUrl);

  // Join Zone checklist
  function joinChecklist() {
    const name = $('#employeeName').value.trim();
    if (!name) {
      toast('Vui lòng nhập họ tên đầy đủ.', 'error');
      $('#employeeName').focus();
      return;
    }
    if (!selectedArea) {
      toast('Vui lòng chọn một khu trực bên dưới.', 'error');
      return;
    }
    const areaData = getAreaData(selectedArea);
    const key = safeId(name);
    if (!areaData.participants.some(p => p.key === key)) {
      areaData.participants.push({ key, name, joinedAt: new Date().toISOString() });
    }
    session = { name, area: selectedArea };
    saveSession();
    saveDB();
    renderAll();
    toast(`${name} đã tham gia checklist khu ${selectedArea}.`, 'success');
    
    // Automatically trigger a background update of participants to the server

    }

  // Checklist computation helpers
  function itemHasSubtasks(item) {
    return Array.isArray(item.subitems) && item.subitems.length > 0;
  }

  function buildSubchecks(item, checked) {
    const o = {};
    (item.subitems || []).forEach(sub => o[sub.id] = !!checked);
    return o;
  }

  function normalizeItemState(item, raw = {}) {
    const subitems = item.subitems || [];
    let subchecks = { ...(raw.subchecks || {}) };
    if (subitems.length && raw.checked && !raw.subchecks) {
      subchecks = buildSubchecks(item, true);
    }
    const checked = subitems.length ? subitems.every(sub => !!subchecks[sub.id]) : !!raw.checked;
    return {
      checked,
      note: raw.note || '',
      subchecks,
      by: raw.by || '',
      at: raw.at || ''
    };
  }

  function getMergedItemState(item) {
    const saved = normalizeItemState(item, (getAreaData().items || {})[item.id] || {});
    if (Object.prototype.hasOwnProperty.call(pending, item.id)) {
      const p = pending[item.id] || {};
      const subchecks = itemHasSubtasks(item) ? { ...saved.subchecks, ...(p.subchecks || {}) } : {};
      const checked = itemHasSubtasks(item) ? item.subitems.every(sub => !!subchecks[sub.id]) : !!p.checked;
      return {
        ...saved,
        ...p,
        subchecks,
        checked,
        note: (p.note ?? saved.note ?? '')
      };
    }
    return saved;
  }

  function isItemCompleteForArea(areaData, item) {
    return normalizeItemState(item, (areaData.items || {})[item.id] || {}).checked;
  }

  function makeParentToggleState(item, checked, note = '') {
    const subchecks = itemHasSubtasks(item) ? buildSubchecks(item, checked) : {};
    const finalChecked = itemHasSubtasks(item) ? item.subitems.every(sub => !!subchecks[sub.id]) : !!checked;
    return {
      checked: finalChecked,
      subchecks,
      note,
      by: session.name,
      at: new Date().toISOString()
    };
  }

  function makeSubToggleState(item, subId, checked, note = '') {
    const cur = getMergedItemState(item);
    const subchecks = { ...cur.subchecks, [subId]: !!checked };
    const finalChecked = item.subitems.every(sub => !!subchecks[sub.id]);
    return {
      checked: finalChecked,
      subchecks,
      note,
      by: session.name,
      at: new Date().toISOString()
    };
  }

  function countSubDone(item, state) {
    return (item.subitems || []).filter(sub => !!state.subchecks?.[sub.id]).length;
  }

  function renderSummary() {
    const states = flatItems.map(item => getMergedItemState(item));

    const total = flatItems.length;
    
    const subTotal = flatItems.reduce((s, i) => s + (i.subitems?.length || 0), 0);

  // Toggling checklists
  async function onItemToggle(e) {
    const id = e.target.dataset.itemId;
    const checked = e.target.checked;
    const item = flatItems.find(x => x.id === id);
    
    const state = makeParentToggleState(item, checked, getNoteValue(id));

    if (getSaveMode() === 'single') {
      const detail = itemHasSubtasks(item) ? ' và các việc con?' : '?';
      if (!confirm(`Xác nhận đánh dấu hoàn thành Hạng mục ${item.no}${detail}`)) {
        e.target.checked = !checked;
        return;
      }
      pending[id] = state;
      await syncStateToServer(false);
    } else {
      pending[id] = state;
      renderChecklist();
      renderAreaBoard();
    }
  }

  async function onSubItemToggle(e) {
    const parentId = e.target.dataset.parentId;
    const subId = e.target.dataset.subId;
    const checked = e.target.checked;
    const item = flatItems.find(x => x.id === parentId);
    
    const state = makeSubToggleState(item, subId, checked, getNoteValue(parentId));

    if (getSaveMode() === 'single') {
      pending[parentId] = state;
      await syncStateToServer(false);
    } else {
      pending[parentId] = state;
      renderChecklist();
      renderAreaBoard();
    }
  }

  async function saveNote(id) {
    if (!session.name || !selectedArea) {
      toast('Vui lòng tham gia checklist trước.', 'error');
      return;
    }
    const item = flatItems.find(x => x.id === id);
    const note = getNoteValue(id);
    const cur = getMergedItemState(item);
    
    const next = {
      ...cur,
      note,
      by: session.name,
      at: new Date().toISOString()
    };

    pending[id] = next;
    
    if (getSaveMode() === 'single') {
      await syncStateToServer(false);
      toast('Ghi chú đã lưu trực tuyến!', 'success');
    } else {
      renderPendingBanner();
      renderSummary();
      toast('Ghi chú được lưu tạm. Hãy bấm nút đồng bộ.', 'info');
    }
  }

  // Synchronize checklist changes to Google Sheets
  async function syncStateToServer(interactive = true) {
    if (!session.name || !selectedArea) {
      toast('Vui lòng chọn khu & điền tên nhân viên trước!', 'error');
      return;
    }

    const keys = Object.keys(pending);
    if (!keys.length && interactive) {
      toast('Không có thay đổi nào cần đồng bộ.', 'info');
      return;
    }

    if (interactive && !confirm(`Đồng bộ các checklist Khu ${selectedArea} lên Google Sheets?`)) {
      return;
    }

    const dateKey = currentDate();
    const areaData = getAreaData();

    // Apply pending local modifications to DB
    keys.forEach(id => {
      if (id === 'supply' || id === 'signatures') return;
      const item = flatItems.find(x => x.id === id);
      const state = pending[id];
      const norm = normalizeItemState(item, state);
      areaData.items[id] = {
        checked: norm.checked,
        note: norm.note,
        subchecks: norm.subchecks,
        by: session.name,
        at: norm.at || new Date().toISOString()
      };
    });

    const backupPending = { ...pending };
    pending = {}; // Clear pending immediately to avoid repeat sync triggers
    
    toast('Đang đồng bộ dữ liệu lên Google Sheets...', 'info');
    
    try {
      const result = await callAPI('saveChecklistState', [
        dateKey,
        selectedArea,
        areaData.participants,
        areaData.items,
        areaData.supply,
        areaData.signatures
      ]);

      saveDB();
      renderAll();
      toast('Đồng bộ dữ liệu lên Google Sheets thành công!', 'success');
    } catch(err) {
      console.error("Sync Failed:", err);
      // Restore pending cache if server sync fails
      pending = { ...backupPending, ...pending };
      
      if (err.message === 'API_NOT_CONFIGURED') {
        saveDB();
        renderAll();
        toast('Dữ liệu đã được lưu ngoại tuyến trên trình duyệt (Thiếu API URL).', 'success');
      } else {
        toast('Lỗi đồng bộ. Dữ liệu đã lưu tạm trên thiết bị, sẽ thử lại sau.', 'error');
      }
    }
  }

  function getReportOptions() {

      showSubtasks: !!$('#reportShowSubtasks').checked,

  function openReportModal() {
    if (!selectedArea) {
      toast('Hãy chọn khu và tham gia trước khi tạo báo cáo.', 'error');
      return;
    }
    if (Object.keys(pending).length) {
      toast('Hãy lưu/đồng bộ các checklist trước khi tạo báo cáo.', 'error');
      return;
    }
    $('#reportModal').classList.add('show');
    renderReportPreview();
  }

  function closeReportModal() { $('#reportModal').classList.remove('show'); }

  function getAreaStats(areaData) {
    const totalItems = flatItems.length;
    const doneItems = flatItems.filter(item => normalizeItemState(item, (areaData.items || {})[item.id] || {}).checked).length;
    
    const totalSub = flatItems.reduce((s, i) => s + (i.subitems?.length || 0), 0);
    const doneSub = flatItems.reduce((s, item) => s + countSubDone(item, normalizeItemState(item, (areaData.items || {})[item.id] || {})), 0);
    
    return {
      totalItems,
      doneItems,
      pendingItems: totalItems - doneItems,
      progress: totalItems ? Math.round((doneItems / totalItems) * 100) : 0,
      totalSubtasks: totalSub,
      doneSubtasks: doneSub,
      pendingSubtasks: totalSub - doneSub
    };
  }

  function renderReportPreview() {
    const opts = getReportOptions();
    if (opts.scope === 'all') {
      const day = ensureDay(currentDate());
      $('#reportMetaPill').textContent = `Tổng hợp 4 khu · ${formatDateVN(currentDate())}`;
      $('#reportPreview').innerHTML = buildAllAreasReportHTML(day, opts);
      return;
    }
    const areaData = getAreaData(selectedArea);
    $('#reportMetaPill').textContent = `Khu ${selectedArea} · ${formatDateVN(currentDate())}`;
    $('#reportPreview').innerHTML = buildReportHTML(areaData, opts);
  }

  function buildReportHTML(areaData, opts) {
    const stats = getAreaStats(areaData);
    const participants = (areaData.participants || []).map(p => `<span class="report-staff-chip">👤 ${escapeHtml(p.name)} · ${timeOnly(p.joinedAt)}</span>`).join('') 
      || '<div class="report-empty">Chưa có nhân viên tham gia khu trực này.</div>';
    
    const groupsHtml = checklist.map(group => {
      const rows = group.items.map(item => renderReportItem(item, normalizeItemState(item, (areaData.items || {})[item.id] || {}), opts)).filter(Boolean).join('');
      const visibleCount = group.items.filter(item => opts.mode === 'all' || normalizeItemState(item, (areaData.items || {})[item.id] || {}).checked).length;
      if (!rows.trim() && !opts.includeEmptyGroups) return '';
      const doneCount = group.items.filter(item => normalizeItemState(item, (areaData.items || {})[item.id] || {}).checked).length;
      return `<section class="report-group">
        <div class="report-group-head">
          <div>
            <div class="report-group-title">${escapeHtml(group.section)}</div>
            <div class="report-group-sub">
              <span class="report-phase-pill">${escapeHtml(group.phase)}</span>
              <span class="report-phase-pill">${escapeHtml(group.shift)}</span>
              <span class="report-count-pill">${doneCount}/${group.items.length} hạng mục xong</span>
            </div>
          </div>
          <div class="report-status ${doneCount === group.items.length ? 'done' : 'pending'}">${opts.mode === 'completed' ? visibleCount + ' mục hiển thị' : 'Đầy đủ'}</div>
        </div>
        ${rows || '<div class="report-empty">Không có hạng mục công việc.</div>'}
      </section>`;
    }).join('') || '<div class="report-section"><div class="report-empty">Chưa có dữ liệu.</div></div>';

    const supplyHtml = opts.includeSupply ? buildSupplyReport(areaData) : '';
    const sigHtml = opts.includeSignatures ? buildSignatureReport(areaData) : '';

    return `
      <div class="report-sheet" id="reportSheet">
        <header class="report-header">
          <div>
            <div class="report-kicker">KING'S GRILL · CHECKLIST BÁO CÁO</div>
            <div class="report-title">Báo cáo checklist công việc hàng ngày</div>
            <p class="report-subtitle">Tình trạng hoàn thành công việc đầu ca - cuối ca, ghi chú vận hành và chữ ký xác nhận.</p>
          </div>
          <div class="report-badge-area"><b>Khu trực</b><span>${escapeHtml(selectedArea)}</span></div>
        </header>
        <div class="report-meta-bar">
          <section class="report-staff">
            <div class="report-section-title">👥 Nhân viên khu trực</div>
            <div class="report-staff-chips">${participants}</div>
          </section>
          <section class="report-meta-card">
            <div class="report-section-title">🗓️ Thông tin vận hành</div>
            <div class="report-item-meta">
              <span>Ngày: <b>${formatDateVN(currentDate())}</b></span>
              <span>Chế độ: <b>${opts.mode === 'completed' ? 'Việc đã làm' : 'Toàn bộ'}</b></span>
              <span>Tạo lúc: <b>${timeOnly(new Date().toISOString())}</b></span>
            </div>
          </section>
        </div>
        <div class="report-meta-list">
          <div class="report-metric"><b>${stats.doneItems}/${stats.totalItems}</b><span>Hạng mục xong</span></div>
          <div class="report-metric"><b>${stats.progress}%</b><span>Tỷ lệ xong</span></div>
          <div class="report-metric"><b>${stats.doneSubtasks}/${stats.totalSubtasks}</b><span>Việc con xong</span></div>
          <div class="report-metric"><b>${stats.pendingItems}</b><span>Mục chưa làm</span></div>
        </div>
        ${groupsHtml}
        ${supplyHtml}
        ${sigHtml}
        <footer class="report-footer">
          <div>Hệ thống đồng bộ Google Sheets · Báo cáo ảnh PNG</div>
          <div>Bảng checklist công việc nhà hàng King's Grill</div>
        </footer>
      </div>
    `;
  }

  function renderReportItem(item, state, opts) {
    if (opts.mode === 'completed' && !state.checked) return '';
    const isDone = state.checked;
    let subtasks = '';
    
    if (opts.showSubtasks && itemHasSubtasks(item)) {
      const rows = (item.subitems || [])
        .filter(sub => opts.mode === 'all' || !!state.subchecks?.[sub.id])
        .map(sub => {
          const subDone = !!state.subchecks?.[sub.id];
          return `<div class="report-subtask ${subDone ? 'done' : 'pending'}"><span class="dot">${subDone ? '✓' : '•'}</span><span>${escapeHtml(sub.text)}</span></div>`;
        }).join('');
      if (rows) subtasks = `<div class="report-subtasks">${rows}</div>`;
    }

    const note = state.note ? `<div class="report-note"><b>Ghi chú:</b> ${escapeHtml(state.note)}</div>` : '';
    
    return `
      <div class="report-item ${isDone ? 'done' : 'pending'}">
        <div class="report-item-head">
          <div class="report-item-main">
            <div class="report-item-no">${escapeHtml(item.no)}</div>
            <div>
              <div class="report-item-title">${escapeHtml(item.title)}</div>
              <div class="report-item-text">${escapeHtml(item.text)}</div>
            </div>
          </div>
          <div class="report-status ${isDone ? 'done' : 'pending'}">${isDone ? '✓ Đã xong' : '• Chưa xong'}</div>
        </div>
        <div class="report-item-meta">
          <span>${state.by ? 'Xác nhận: ' + escapeHtml(state.by) : 'Chưa xác nhận'}</span>
          <span>${state.at ? timeOnly(state.at) + ' ' + dateOnly(state.at) : ''}</span>
        </div>
        ${subtasks}
        ${note}
      </div>
    `;
  }

  function buildSupplyReport(areaData) {
    const map = {
      du_dung: 'Đủ dùng',
      khan_giay: 'Khăn giấy',
      ong_hut: 'Ống hút',
      diem: 'Diêm',
      tam: 'Tăm',
      xien_tre: 'Xiên tre',
      bao_tay: 'Bao tay',
      bao_rac: 'Bao rác',
      bao_rac_den: 'Bao rác đen kín',
      bao_rac_dai: 'Bao rác đại',
      bao_rac_trung: 'Bao rác trung',
      bao_rac_tieu: 'Bao rác tiểu',
      bich_mang_ve: 'Bọc mang về',
      bich_lau: 'Bịch lẩu',
      bich_3kg: 'Bịch 3kg',
      bich_5kg: 'Bịch 5kg',
      hop_mang_ve: 'Hộp mang về',
      hop_xop: 'Hộp xốp',
      hop_nhua: 'Nhựa nắp rời'
    };
    
    const s = areaData.supply || {};
    const selected = Object.entries(s)
      .filter(([k, v]) => !['note', 'by', 'savedAt'].includes(k) && v)
      .map(([k]) => `<span class="report-staff-chip">${escapeHtml(map[k] || k)}</span>`)
      .join('');
      
    return `
      <section class="report-section">
        <div class="report-section-title">📦 Đề xuất cấp vật tư</div>
        ${selected ? `<div class="report-staff-chips">${selected}</div>` : '<div class="report-empty">Không có vật tư đề xuất.</div>'}
        ${s.note ? `<div class="report-note"><b>Ghi chú vật tư:</b> ${escapeHtml(s.note)}</div>` : ''}
        <div class="report-item-meta">
          ${s.savedAt ? `<span>Đề xuất: ${escapeHtml(s.by || '')} lúc ${timeOnly(s.savedAt)}</span>` : ''}
        </div>
      </section>
    `;
  }

  function buildSignatureReport(areaData) {
    const sig = areaData.signatures || {};
    return `
      <section class="report-section">
        <div class="report-section-title">✍️ Xác nhận bàn giao ca</div>
        <div class="report-staff-chips">
          <span class="report-staff-chip">Nhận ca: ${escapeHtml(sig.receive || 'Chưa ký')}</span>
          <span class="report-staff-chip">Giao ca: ${escapeHtml(sig.handover || 'Chưa ký')}</span>
          <span class="report-staff-chip">Quản lý: ${escapeHtml(sig.manager || 'Chưa xác nhận')}</span>
        </div>
      </section>
    `;
  }

  function buildAllAreasReportHTML(day, opts) {
    const totals = AREA_CODES.reduce((a, area) => {
      const s = getAreaStats(day.areas[area]);
      a.doneItems += s.doneItems;
      a.totalItems += s.totalItems;
      a.doneSubtasks += s.doneSubtasks;
      a.totalSubtasks += s.totalSubtasks;
      a.staff += (day.areas[area].participants || []).length;
      return a;
    }, { doneItems: 0, totalItems: 0, doneSubtasks: 0, totalSubtasks: 0, staff: 0 });

    const pct = totals.totalItems ? Math.round((totals.doneItems / totals.totalItems) * 100) : 0;
    
    const blocks = AREA_CODES.map(area => {
      const data = day.areas[area];
      const stats = getAreaStats(data);
      const staff = (data.participants || []).map(p => `<span class="report-staff-chip">👤 ${escapeHtml(p.name)}</span>`).join('') 
        || '<div class="report-empty">Không có nhân viên.</div>';
        
      const source = opts.mode === 'completed' 
        ? flatItems.filter(item => normalizeItemState(item, (data.items || {})[item.id] || {}).checked)
        : flatItems;
        
      const limit = opts.mode === 'completed' ? 18 : 24;
      const items = source.slice(0, limit)
        .map(item => renderReportItem(item, normalizeItemState(item, (data.items || {})[item.id] || {}), opts))
        .join('') || '<div class="report-empty">Không có hạng mục.</div>';

      return `
        <section class="report-area-block">
          <div class="report-area-block-head">
            <div>
              <div class="report-area-block-title">Khu ${escapeHtml(area)}</div>
              <div class="report-group-sub">
                <span class="report-count-pill">${stats.doneItems}/${stats.totalItems} hạng mục</span>
                <span class="report-phase-pill">${stats.doneSubtasks}/${stats.totalSubtasks} việc con</span>
              </div>
            </div>
            <div class="report-status ${stats.progress === 100 ? 'done' : 'pending'}">${stats.progress}% hoàn thành</div>
          </div>
          <div class="report-area-grid">
            <div class="report-mini-metric"><b>${stats.doneItems}</b><span>Hạng mục xong</span></div>
            <div class="report-mini-metric"><b>${stats.pendingItems}</b><span>Chưa hoàn thành</span></div>
            <div class="report-mini-metric"><b>${stats.doneSubtasks}</b><span>Việc con xong</span></div>
            <div class="report-mini-metric"><b>${(data.participants || []).length}</b><span>Nhân viên trực</span></div>
          </div>
          <section class="report-section" style="margin:0 20px 14px">
            <div class="report-section-title">👥 Phụ trách</div>
            <div class="report-staff-chips">${staff}</div>
          </section>
          <section class="report-section" style="margin:0 20px 20px">
            <div class="report-section-title">${opts.mode === 'completed' ? '✅ Việc đã làm' : '📋 Trạng thái checklist'}</div>
            ${items}
            ${source.length > limit ? `<div class="report-note">Còn ${source.length - limit} việc khác được thu gọn.</div>` : ''}
          </section>
        </section>
      `;
    }).join('');

    return `
      <div class="report-sheet" id="reportSheet">
        <header class="report-header">
          <div>
            <div class="report-kicker">KING'S GRILL · CHECKLIST BÁO CÁO TỔNG HỢP</div>
            <div class="report-title">Báo cáo tổng hợp tiến độ checklist 4 khu</div>
            <p class="report-subtitle">Tổng hợp trạng thái checklist vận hành ngày hôm nay.</p>
          </div>
          <div class="report-badge-area"><b>Tổng tiến độ</b><span>${pct}%</span></div>
        </header>
        <div class="report-meta-list">
          <div class="report-metric"><b>${totals.doneItems}/${totals.totalItems}</b><span>Hạng mục tổng xong</span></div>
          <div class="report-metric"><b>${totals.doneSubtasks}/${totals.totalSubtasks}</b><span>Việc con xong</span></div>
          <div class="report-metric"><b>${totals.staff}</b><span>Nhân viên tham gia</span></div>
          <div class="report-metric"><b>${formatDateVN(currentDate())}</b><span>Ngày báo cáo</span></div>
        </div>
        ${blocks}
        <footer class="report-footer">
          <div>Hệ thống đồng bộ Google Sheets · Báo cáo ảnh tổng hợp</div>
          <div>Bảng tổng hợp checklist King's Grill</div>
        </footer>
      </div>
    `;
  }

  // Export report preview layout to PNG image file
  async function downloadReportImage() {
    const target = $('#reportSheet');
    if (!target) {
      toast('Không tìm thấy nội dung báo cáo để xuất ảnh.', 'error');
      return;
    }
    const btn = $('#downloadReportBtn');
    const old = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Đang xuất ảnh...';

    try {
      let canvas;
      if (window.html2canvas) {
        canvas = await window.html2canvas(target, {
          scale: 2,
          backgroundColor: '#f5f8fc',
          useCORS: true,
          logging: false
        });
      } else {
        throw new Error('Thư viện html2canvas chưa được nạp.');
      }
      
      const url = canvas.toDataURL('image/png');
      const a = document.createElement('a');
      a.href = url;
      const scopeName = getReportOptions().scope === 'all' ? 'TONG_HOP_4_KHU' : String(selectedArea || '').replace('&', 'E');
      a.download = `KG_CHECKLIST_BAOCAO_${currentDate()}_${scopeName}.png`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      toast('Đã tải ảnh báo cáo PNG thành công!', 'success');
    } catch (err) {
      console.error(err);
      toast('Không thể tải ảnh. Hãy thử lại hoặc in file ra PDF.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = old;
    }
  }

  // Data Import/Export (JSON Local Backup)
  function exportData() {
    const payload = {
      schema: 'KG_CHECKLIST_WEBAPP_V7',
      exportedAt: new Date().toISOString(),
      selectedDate: currentDate(),
      selectedArea,
      data: ensureDay(currentDate()),
      fullDB: db
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `KG_CHECKLIST_${currentDate()}${selectedArea ? '_' + selectedArea.replace('&', 'E') : ''}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    toast('Đã xuất dữ liệu lưu trữ JSON!', 'success');
  }

  function importData(event) {
    const file = event.target.files && event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const payload = JSON.parse(reader.result);
        const incoming = payload.fullDB || payload;
        
        if (!incoming.days && payload.data?.areas) {
          incoming.days = { [payload.selectedDate || currentDate()]: payload.data };
        }
        
        if (!incoming.days) throw new Error('Cấu trúc file JSON không chính xác.');
        
        if (!confirm('Nhập đè dữ liệu checklist đã chọn? Tiến độ hiện tại trên máy này sẽ bị gộp.')) return;
        
        db.days = { ...(db.days || {}), ...(incoming.days || {}) };
        saveDB();
        ensureDay(currentDate());
        renderAll();
        toast('Gộp dữ liệu thành công!', 'success');
      } catch (err) {
        console.error(err);
        toast('File dữ liệu JSON không hợp lệ!', 'error');
      } finally {
        event.target.value = '';
      }
    };
    reader.readAsText(file, 'utf-8');
  }

  // Helper date/time formatters
  function timeOnly(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
  }

  function dateOnly(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('vi-VN');
  }

  function escapeHtml(str) {
    return String(str ?? '').replace(/[&<>'"]/g, s => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
    }[s]));
  }

  // Execute initialization on page load
  window.addEventListener('DOMContentLoaded', init);
</script>
