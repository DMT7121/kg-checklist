<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap');

  :root {
    --bg: #f5f8fc;
    --panel: rgba(255, 255, 255, 0.85);
    --panel-border: rgba(226, 232, 240, 0.8);
    --ink: #0f172a;
    --muted: #475569;
    --line: #e2e8f0;
    
    --blue-base: 210;
    --blue: hsl(var(--blue-base), 80%, 25%);
    --blue-2: hsl(var(--blue-base), 85%, 38%);
    --blue-3: hsl(var(--blue-base), 85%, 95%);
    --blue-glow: hsla(var(--blue-base), 85%, 38%, 0.15);
    
    --green: #10b981;
    --green-light: #ecfdf5;
    --green-border: #a7f3d0;
    --green-text: #047857;
    
    --amber: #f59e0b;
    --amber-light: #fffbeb;
    --amber-border: #fde68a;
    --amber-text: #b45309;
    
    --red: #ef4444;
    --red-light: #fef2f2;
    --red-border: #fca5a5;
    --red-text: #b91c1c;

    --shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.08);
    --shadow-hover: 0 30px 60px -15px rgba(15, 23, 42, 0.15);
    --shadow-glow: 0 0 25px rgba(15, 95, 156, 0.25);
    --radius: 24px;
    --radius-sm: 12px;
    --radius-md: 16px;
  }

  * { box-sizing: border-box; }
  
  html, body {
    margin: 0;
    min-height: 100%;
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
  }

  body {
    background: 
      radial-gradient(circle at 10% 20%, rgba(15, 95, 156, 0.08) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.06) 0%, transparent 45%),
      linear-gradient(180deg, #f8fafc 0%, #edf2f7 100%);
    background-attachment: fixed;
    padding-bottom: 60px;
  }

  button, input, select, textarea { font: inherit; }
  button { cursor: pointer; border: none; background: none; }

  /* Main Container */
  .app {
    max-width: 1600px;
    margin: 0 auto;
    padding: 30px 24px;
  }

  /* Top Bar Branding */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .brand {
    display: flex;
    gap: 18px;
    align-items: center;
  }

  .logo {
    width: 60px;
    height: 60px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--blue), var(--blue-2));
    display: grid;
    place-items: center;
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-weight: 900;
    font-size: 24px;
    box-shadow: 0 12px 28px rgba(15, 95, 156, 0.3);
    border: 2px solid rgba(255, 255, 255, 0.2);
    position: relative;
    overflow: hidden;
  }

  .logo::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent 45%, rgba(255, 255, 255, 0.15) 50%, transparent 55%);
    transform: rotate(30deg);
    animation: shine 4s infinite linear;
  }

  @keyframes shine {
    0% { transform: translate(-30%, -30%) rotate(30deg); }
    100% { transform: translate(30%, 30%) rotate(30deg); }
  }

  h1 {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(22px, 2.5vw, 32px);
    line-height: 1.15;
    margin: 0;
    font-weight: 800;
    background: linear-gradient(135deg, var(--blue) 0%, var(--blue-2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .subtitle {
    margin-top: 4px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  /* Premium Buttons */
  .btn {
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    padding: 10px 18px;
    border-radius: var(--radius-sm);
    font-weight: 700;
    font-size: 14px;
    box-shadow: 0 4px 10px rgba(15, 23, 42, 0.04);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .btn:hover {
    border-color: #cbd5e1;
    transform: translateY(-2px);
    box-shadow: 0 8px 16px rgba(15, 23, 42, 0.08);
  }

  .btn:active {
    transform: translateY(0);
  }

  .btn.primary {
    background: linear-gradient(135deg, var(--blue), var(--blue-2));
    color: #fff;
    border: none;
    box-shadow: 0 10px 20px -8px rgba(15, 95, 156, 0.4);
  }

  .btn.primary:hover {
    box-shadow: 0 15px 24px -6px rgba(15, 95, 156, 0.5);
  }

  .btn.good {
    background: var(--green-light);
    color: var(--green-text);
    border-color: var(--green-border);
  }
  .btn.good:hover {
    background: #d1fae5;
  }

  .btn.warn {
    background: var(--amber-light);
    color: var(--amber-text);
    border-color: var(--amber-border);
  }
  .btn.warn:hover {
    background: #fef3c7;
  }

  .btn.danger {
    background: var(--red-light);
    color: var(--red-text);
    border-color: var(--red-border);
  }
  .btn.danger:hover {
    background: #fee2e2;
  }

  .btn[disabled] {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }

  /* Glassmorphism Panel */
  .panel {
    background: var(--panel);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    transition: all 0.3s ease;
  }

  .panel:hover {
    box-shadow: var(--shadow-hover);
  }

  /* Control Panel Section */
  .control-panel {
    display: grid;
    grid-template-columns: 1.2fr 0.8fr;
    gap: 24px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1.2fr 0.8fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-weight: 800;
    color: var(--muted);
    margin: 0 0 8px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .input, .select, .textarea {
    width: 100%;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    outline: none;
    color: var(--ink);
    font-size: 15px;
    transition: all 0.2s ease;
  }

  .input:focus, .select:focus, .textarea:focus {
    border-color: var(--blue-2);
    box-shadow: 0 0 0 4px var(--blue-glow);
  }

  .textarea {
    min-height: 100px;
    resize: vertical;
  }

  .hint {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  .control-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  /* Mode selection grid */
  .mode-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    height: 100%;
    justify-content: center;
  }

  .mode-card {
    padding: 16px;
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
    background: #fff;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .mode-card:hover {
    border-color: var(--blue-2);
    background: var(--blue-3);
  }

  .mode-card input {
    margin-top: 4px;
    transform: scale(1.25);
    accent-color: var(--blue-2);
  }

  .mode-title {
    display: block;
    font-weight: 800;
    color: var(--blue);
    font-size: 15px;
  }

  .mode-desc {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    line-height: 1.4;
    display: block;
  }

  /* Interactive Area/Zone Board */
  .area-board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .area-card {
    padding: 20px;
    border-radius: var(--radius);
    border: 1px solid var(--panel-border);
    background: rgba(255, 255, 255, 0.7);
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .area-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-hover);
  }

  .area-card.active {
    background: linear-gradient(135deg, #092c4f 0%, var(--blue-2) 100%);
    color: #fff;
    border-color: transparent;
    box-shadow: var(--shadow-glow);
  }

  .area-card::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 6px;
    background: var(--blue-2);
    transition: all 0.3s ease;
  }

  .area-card.active::before {
    width: 8px;
    background: var(--amber);
    box-shadow: 0 0 15px var(--amber);
  }

  .area-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }

  .area-title-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .area-title {
    font-family: 'Outfit', sans-serif;
    font-size: 22px;
    color: var(--blue);
    font-weight: 800;
  }
  .area-card.active .area-title { color: #fff; }

  .area-selected-badge {
    display: none;
    border-radius: 99px;
    background: rgba(255, 255, 255, 0.2);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.4);
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .area-card.active .area-selected-badge { display: inline-flex; }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border-radius: 99px;
    background: var(--blue-3);
    color: var(--blue-2);
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 800;
  }
  .area-card.active .pill {
    background: rgba(255, 255, 255, 0.2);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.3);
  }

  /* Animated Progress Line */
  .progress-line {
    height: 8px;
    background: #e2e8f0;
    border-radius: 99px;
    overflow: hidden;
    margin: 12px 0;
  }
  .progress-line span {
    display: block;
    height: 100%;
    background: linear-gradient(90deg, var(--green), #34d399);
    width: 0%;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .area-card.active .progress-line { background: rgba(255, 255, 255, 0.2); }
  .area-card.active .progress-line span { background: linear-gradient(90deg, #fff, #a7f3d0); }

  .area-card .hint { margin-bottom: 12px; }
  .area-card.active .hint { color: rgba(255, 255, 255, 0.85); }
  .area-card.active .empty { color: rgba(255, 255, 255, 0.65); }

  .staff-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 12px;
    border-top: 1px dashed rgba(15, 23, 42, 0.08);
    padding-top: 12px;
  }
  .area-card.active .staff-list { border-top-color: rgba(255, 255, 255, 0.15); }

  .staff-chip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    border: 1px solid rgba(226, 232, 240, 0.8);
    background: #f8fafc;
    border-radius: 10px;
    padding: 6px 10px;
    font-weight: 700;
    font-size: 13px;
  }
  .area-card.active .staff-chip {
    background: rgba(255, 255, 255, 0.12);
    border-color: rgba(255, 255, 255, 0.2);
    color: #fff;
  }
  .staff-chip small { color: var(--muted); }
  .area-card.active .staff-chip small { color: rgba(255, 255, 255, 0.7); }

  .empty {
    color: var(--muted);
    font-style: italic;
    font-size: 13px;
    line-height: 1.4;
  }

  /* Two Column Layout */
  .layout {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 24px;
    align-items: start;
  }

  .checklist-card {
    overflow: hidden;
  }

  /* Filter Tabs */
  .section-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 20px 20px 0;
    border-bottom: 1px solid var(--line);
    background: rgba(248, 250, 252, 0.4);
  }

  .tab {
    border: 1px solid var(--line);
    border-radius: 99px;
    background: #fff;
    color: var(--muted);
    font-weight: 800;
    font-size: 13px;
    padding: 8px 16px;
    margin-bottom: 12px;
    transition: all 0.2s ease;
  }

  .tab:hover {
    border-color: var(--blue-2);
    color: var(--blue-2);
  }

  .tab.active {
    background: var(--blue);
    color: #fff;
    border-color: var(--blue);
    box-shadow: 0 4px 12px var(--blue-glow);
  }

  /* Summary metric strip */
  .summary-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 16px 20px;
    background: #fff;
    border-bottom: 1px solid var(--line);
  }

  .metric {
    border: 1px solid #f1f5f9;
    border-radius: var(--radius-md);
    background: #f8fafc;
    padding: 12px;
    text-align: center;
  }
  .metric b {
    display: block;
    color: var(--blue-2);
    font-size: 22px;
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
  }
  .metric span {
    font-size: 11px;
    text-transform: uppercase;
    font-weight: 800;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* Sync alert banner */
  .pending-banner {
    display: none;
    margin: 16px 20px;
    padding: 14px 20px;
    border-radius: var(--radius-md);
    background: #fffbeb;
    border: 1px solid #fef3c7;
    color: var(--amber-text);
    font-weight: 700;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    animation: pulseBorder 2s infinite ease-in-out;
  }
  .pending-banner.show { display: flex; }

  @keyframes pulseBorder {
    0%, 100% { border-color: #fde68a; box-shadow: 0 0 0 rgba(245, 158, 11, 0); }
    50% { border-color: #f59e0b; box-shadow: 0 0 10px rgba(245, 158, 11, 0.15); }
  }

  /* Custom checklist tables */
  .table-wrapper {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  .check-table th {
    background: linear-gradient(135deg, var(--blue) 0%, #082848 100%);
    color: #fff;
    text-align: left;
    padding: 14px 16px;
    font-size: 13px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-weight: 800;
  }

  .check-table td {
    border-bottom: 1px solid var(--line);
    border-right: 1px solid var(--line);
    vertical-align: top;
    background: #fff;
    padding: 16px;
    transition: background 0.2s ease;
  }
  .check-table td:last-child { border-right: none; }
  .check-table tr:hover td { background: #fafcff; }

  /* Section Header Row */
  .group-row td {
    background: #f0f6fc !important;
    color: var(--blue);
    font-weight: 850;
    padding: 12px 16px;
    border-top: 2px solid var(--blue-2);
    border-bottom: 2px solid var(--blue-2);
    font-size: 15px;
    font-family: 'Outfit', sans-serif;
  }

  .phase-badge {
    display: inline-flex;
    align-items: center;
    border-radius: 99px;
    background: #fff;
    color: var(--blue-2);
    border: 1px solid #cbd5e1;
    padding: 4px 10px;
    margin-right: 8px;
    font-size: 11px;
    font-weight: 800;
  }

  .stt {
    width: 58px;
    text-align: center;
    font-weight: 900;
    color: var(--blue-2);
    background: #f8fafc !important;
  }

  /* Checklist item text */
  .task-cell { padding: 16px; }
  .task-title {
    font-weight: 800;
    color: #1e293b;
    font-size: 16px;
    margin-bottom: 6px;
  }
  .task-text {
    line-height: 1.5;
    color: var(--muted);
    font-size: 14px;
  }
  
  .task-meta {
    margin-top: 10px;
    color: var(--muted);
    font-size: 12px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .done-meta {
    color: var(--green-text);
    font-weight: 800;
    background: var(--green-light);
    border: 1px solid var(--green-border);
    padding: 2px 8px;
    border-radius: 99px;
  }

  /* Checklist checkboxes */
  .check-cell {
    width: 112px;
    text-align: center;
    background: #f8fafc !important;
    cursor: pointer;
    vertical-align: middle !important;
  }

  .checkbox {
    width: 26px;
    height: 26px;
    accent-color: var(--green);
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  .checkbox:hover { transform: scale(1.1); }

  /* Note section cells */
  .note-cell {
    width: 220px;
    background: #f8fafc !important;
  }
  .row-note {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 8px;
    min-height: 54px;
    font-size: 13px;
    resize: vertical;
    outline: none;
    transition: all 0.2s ease;
  }
  .row-note:focus {
    border-color: var(--blue-2);
    background: #fff;
  }

  .tiny-btn {
    border: 1px solid #cbd5e1;
    background: #fff;
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 11px;
    font-weight: 800;
    color: var(--blue-2);
    margin-top: 6px;
    transition: all 0.15s ease;
  }
  .tiny-btn:hover {
    border-color: var(--blue-2);
    background: var(--blue-3);
  }

  /* Subtasks lists nesting */
  .subtask-panel {
    margin-top: 14px;
    border: 1px solid #e2e8f0;
    background: linear-gradient(180deg, #f8fafc, #f1f5f9);
    border-radius: var(--radius-md);
    padding: 12px;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
  }

  .subtask-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    color: var(--blue);
    font-weight: 800;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .subtask-count {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--green-light);
    color: var(--green-text);
    border: 1px solid var(--green-border);
    border-radius: 99px;
    padding: 4px 8px;
    font-size: 11px;
    font-weight: 850;
    text-transform: none;
  }

  .subtask-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }

  .subtask-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    border: 1px solid #e2e8f0;
    background: #fff;
    border-radius: var(--radius-sm);
    padding: 10px;
    line-height: 1.35;
    font-size: 13px;
    color: #334155;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .subtask-item:hover {
    border-color: var(--blue-2);
    box-shadow: 0 4px 8px rgba(0,0,0,0.03);
  }

  .subtask-checkbox {
    width: 18px;
    height: 18px;
    min-width: 18px;
    accent-color: var(--green);
    cursor: pointer;
    margin-top: 1px;
  }

  .auto-complete-note {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--green-light);
    color: var(--green-text);
    border: 1px solid var(--green-border);
    border-radius: 99px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 800;
  }

  /* Right Sidebar */
  .side {
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: sticky;
    top: 24px;
  }

  .side h2 {
    margin: 0 0 14px;
    color: var(--blue);
    font-size: 18px;
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    border-bottom: 1px dashed var(--line);
    padding-bottom: 10px;
  }

  .guide, .supply, .signature {
    padding: 20px;
  }

  .guide-block {
    border-left: 4px solid var(--blue-2);
    padding: 4px 0 4px 12px;
    margin: 14px 0;
  }
  .guide-block b { color: var(--blue); }
  .guide ul { margin: 6px 0 0 16px; padding: 0; }
  .guide li { margin: 6px 0; color: var(--muted); line-height: 1.4; font-size: 13px; }

  /* Supply sidebar */
  .supply {
    background: linear-gradient(180deg, #fff 0%, #fbfcfe 100%);
  }
  .supply-date {
    font-weight: 800;
    color: var(--muted);
    margin-bottom: 12px;
    font-size: 14px;
